<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GBL – Sosyal Medya</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red-deep:   #c0152a;
      --red-mid:    #e02035;
      --red-light:  #f4435a;
      --red-pale:   #fde8eb;
      --cream:      #fff5f6;
      --grey-text:  #5a5a5a;
      --white:      #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      overflow: hidden;
      position: relative;
    }

    /* ── Arka plan doku katmanları ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(224,32,53,.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at -10% 60%, rgba(192,21,42,.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 110% 80%, rgba(240,60,80,.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* büyük dekoratif daire */
    body::after {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      border: 180px solid rgba(224,32,53,.06);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Kart ── */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(18px) saturate(1.6);
      -webkit-backdrop-filter: blur(18px) saturate(1.6);
      border: 1.5px solid rgba(224,32,53,.18);
      border-radius: 32px;
      padding: 52px 44px 48px;
      width: min(420px, 92vw);
      box-shadow:
        0 4px 6px rgba(192,21,42,.06),
        0 20px 60px rgba(192,21,42,.14),
        inset 0 1px 0 rgba(255,255,255,.9);
      animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(.97); }
      to   { opacity:1; transform: translateY(0)    scale(1);   }
    }

    /* ── Logo alanı ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      animation: fadeUp .6s .1s cubic-bezier(.22,1,.36,1) both;
    }

    .logo-wrap img {
      width: 200px;
      /* Siyah arka planı kes, logoyu şeffaf göster */
      mix-blend-mode: normal;
      filter: drop-shadow(0 2px 8px rgba(192,21,42,.15));
    }

    .brand-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .22em;
      color: var(--red-mid);
      text-transform: uppercase;
      opacity: .85;
    }

    /* ince ayırıcı */
    .divider {
      width: 48px; height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--red-mid), var(--red-light));
      margin: 22px auto 30px;
      animation: fadeUp .5s .2s both;
    }

    /* ── Butonlar ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 17px 22px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .03em;
      color: var(--white);
      position: relative;
      overflow: hidden;
      transition: transform .18s ease, box-shadow .18s ease;
      animation: fadeUp .55s calc(var(--i) * .08s + .25s) cubic-bezier(.22,1,.36,1) both;
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(255,255,255,.12);
      opacity: 0;
      transition: opacity .18s;
    }
    .btn:hover::before { opacity: 1; }

    .btn:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 12px 32px rgba(0,0,0,.22);
    }
    .btn:active { transform: translateY(-1px) scale(1.005); }

    /* Her platform için renk */
    .btn-facebook  { background: linear-gradient(135deg,#1877f2 0%,#0a5ec7 100%); box-shadow: 0 6px 18px rgba(24,119,242,.32); }
    .btn-instagram { background: linear-gradient(135deg,#f58529 0%,#dd2a7b 50%,#8134af 100%); box-shadow: 0 6px 18px rgba(221,42,123,.30); }
    .btn-youtube   { background: linear-gradient(135deg,#ff0000 0%,#cc0000 100%); box-shadow: 0 6px 18px rgba(255,0,0,.28); }
    .btn-linkedin  { background: linear-gradient(135deg,#0a66c2 0%,#004182 100%); box-shadow: 0 6px 18px rgba(10,102,194,.30); }

    .btn-icon {
      width: 38px; height: 38px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.18);
      border-radius: 10px;
    }
    .btn-icon svg { width: 22px; height: 22px; fill: #fff; }

    .btn-label { flex: 1; }

    .btn-arrow {
      opacity: .6;
      font-size: 18px;
      transition: opacity .18s, transform .18s;
    }
    .btn:hover .btn-arrow { opacity: 1; transform: translateX(4px); }

    /* ── Footer ── */
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      color: rgba(192,21,42,.45);
      text-transform: uppercase;
      animation: fadeUp .5s .7s both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0);    }
    }
  </style>
</head>
<body>
